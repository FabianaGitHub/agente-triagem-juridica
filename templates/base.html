<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSUS — {% block titulo %}Painel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f0f4f8; }
    .navbar-acessus { background-color: #1a3c5e; }
    .sidebar {
      min-height: calc(100vh - 57px);
      background: white;
      border-right: 1px solid #dee2e6;
    }
    .card-caso { transition: border-color .15s ease; }
    .card-caso:hover { border-color: #2980b9 !important; }
    .filtro-link {
      display: block;
      padding: 5px 10px;
      border-radius: 5px;
      text-decoration: none;
      color: #444;
      font-size: .85rem;
    }
    .filtro-link:hover { background: #e9ecef; color: #222; }
    .filtro-link.ativo  { background: #dbeafe; color: #1a3c5e; font-weight: 600; }
    .badge-p1 { background-color: #dc3545 !important; }
    .badge-p2 { background-color: #fd7e14 !important; }
    .badge-p3 { background-color: #198754 !important; }
    .secao-header { background-color: #2980b9; color: white; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark navbar-acessus px-3 py-2">
  <span class="navbar-brand fw-bold" style="font-size:.95rem;">
    <i class="bi bi-shield-check me-1"></i>ACESSUS Direito Popular
  </span>
  {% if session.get('logado') %}
  <a href="/advogados/logout" class="btn btn-sm btn-outline-light">
    <i class="bi bi-box-arrow-right me-1"></i>Sair
  </a>
  {% endif %}
</nav>
<div class="container-fluid px-0">
  {% block conteudo %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
