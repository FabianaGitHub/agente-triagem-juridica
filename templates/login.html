{% extends "base.html" %}
{% block titulo %}Acesso{% endblock %}
{% block conteudo %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 57px);">
  <div class="card shadow" style="width:380px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock" style="font-size:2.5rem; color:#1a3c5e;"></i>
        <h5 class="fw-bold mt-2 mb-0" style="color:#1a3c5e;">Área do Advogado</h5>
        <p class="text-muted small mt-1">ACESSUS Direito Popular</p>
      </div>

      {% if erro %}
      <div class="alert alert-danger py-2 small mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ erro }}
      </div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">Senha de acesso</label>
          <input type="password" name="senha" class="form-control"
                 placeholder="Digite a senha" autofocus required>
        </div>
        <button type="submit" class="btn w-100 text-white fw-bold"
                style="background-color:#1a3c5e;">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
