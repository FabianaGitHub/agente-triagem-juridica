{% extends "base.html" %}
{% block titulo %}Acesso{% endblock %}
{% block conteudo %}
<div class="position-relative d-flex justify-content-center align-items-center"
     style="min-height: calc(100vh - 60px); overflow: hidden;">

  <!-- Logo como marca d'água cobrindo todo o fundo -->
  <div style="position: fixed; inset: 0;
              background-image: url('/static/img/Logo Acessus.png');
              background-size: cover;
              background-position: center;
              opacity: 0.07;
              filter: grayscale(1) blur(2px);
              pointer-events: none; z-index: 0;"></div>

  <div class="card shadow" style="width:380px; position: relative; z-index: 1;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <img src="/static/img/Logo Acessus.png" alt="ACESSUS" height="80"
             style="object-fit:contain;" class="mb-2">
        <h5 class="fw-bold mb-0" style="color:#0d2855;">Área do Advogado</h5>
        <p class="small mt-1" style="color:#1e5bb4;">ACESSUS Direito Popular</p>
      </div>

      {% if erro %}
      <div class="alert alert-danger py-2 small mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ erro }}
      </div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">Senha de acesso</label>
          <input type="password" name="senha" class="form-control"
                 placeholder="Digite a senha" autofocus required>
        </div>
        <button type="submit" class="btn w-100 text-white fw-bold"
                style="background-color:#1a3c5e;">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
