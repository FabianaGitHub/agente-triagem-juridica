<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACESSUS — {% block titulo %}Painel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --azul-escuro:  #0d2855;
      --azul-medio:   #1e5bb4;
      --azul-claro:   #4d9de0;
      --fundo:        #f0f4f8;
    }
    body { background-color: var(--fundo); }
    .navbar-acessus { background: linear-gradient(90deg, #000000 0%, var(--azul-escuro) 100%); }
    .navbar-acessus .navbar-brand-text { color: white; font-size: .95rem; font-weight: 700; }
    .navbar-acessus .navbar-brand-sub  { color: var(--azul-claro); font-size: .72rem; letter-spacing: .04em; }
    .sidebar {
      min-height: calc(100vh - 60px);
      background: white;
      border-right: 1px solid #dee2e6;
    }
    .card-caso { transition: border-color .15s ease; }
    .card-caso:hover { border-color: var(--azul-medio) !important; }
    .filtro-link {
      display: block;
      padding: 5px 10px;
      border-radius: 5px;
      text-decoration: none;
      color: #444;
      font-size: .85rem;
    }
    .filtro-link:hover { background: #e9ecef; color: #222; }
    .filtro-link.ativo  { background: #dbeafe; color: var(--azul-escuro); font-weight: 600; }
    .badge-p1 { background-color: #dc3545 !important; }
    .badge-p2 { background-color: #fd7e14 !important; }
    .badge-p3 { background-color: #198754 !important; }
    .secao-header { background-color: var(--azul-medio); color: white; }
    .btn-acessus { background-color: var(--azul-escuro); color: white; }
    .btn-acessus:hover { background-color: var(--azul-medio); color: white; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark navbar-acessus px-3 py-2">
  <div class="d-flex align-items-center gap-2">
    <img src="/static/img/Logo Acessus.png" alt="ACESSUS" height="38"
         style="object-fit:contain;">
    <div class="d-flex flex-column lh-1">
      <span class="navbar-brand-text">ACESSUS</span>
      <span class="navbar-brand-sub">Direito Popular</span>
    </div>
  </div>
  {% if session.get('logado') %}
  <a href="/advogados/logout" class="btn btn-sm btn-outline-light">
    <i class="bi bi-box-arrow-right me-1"></i>Sair
  </a>
  {% endif %}
</nav>
<div class="container-fluid px-0">
  {% block conteudo %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
